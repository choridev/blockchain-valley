version: '3.8'

# Common Configuration Template
x-node-common: &node-common
  image: my-gaiad:hacked
  networks:
    - cosmos-net
  restart: unless-stopped

services:
  node0:
    <<: *node-common
    container_name: node0
    volumes:
      - ./localnet/node0:/home/nonroot/.gaia
    ports:
      - "26657:26657" # RPC
      - "1317:1317"   # REST API
    command: start --rpc.laddr tcp://0.0.0.0:26657 --p2p.laddr tcp://0.0.0.0:26656

  node1:
    <<: *node-common
    container_name: node1
    volumes:
      - ./localnet/node1:/home/nonroot/.gaia
    ports:
      - "26659:26657"
      - "1318:1317"
    command: start --rpc.laddr tcp://0.0.0.0:26657 --p2p.laddr tcp://0.0.0.0:26656

  node2:
    <<: *node-common
    container_name: node2
    volumes:
      - ./localnet/node2:/home/nonroot/.gaia
    ports:
      - "26661:26657"
      - "1319:1317"
    command: start --rpc.laddr tcp://0.0.0.0:26657 --p2p.laddr tcp://0.0.0.0:26656

  node3:
    <<: *node-common
    container_name: node3
    volumes:
      - ./localnet/node3:/home/nonroot/.gaia
    ports:
      - "26663:26657"
      - "1320:1317"
    command: start --rpc.laddr tcp://0.0.0.0:26657 --p2p.laddr tcp://0.0.0.0:26656

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090" # Prometheus Web UI
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - cosmos-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000" # Grafana Web UI
    volumes:
      # 프로비저닝 디렉터리 마운트 (데이터 소스 자동 등록)
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - cosmos-net
    restart: unless-stopped
    depends_on:
      - prometheus

networks:
  cosmos-net:
    driver: bridge
